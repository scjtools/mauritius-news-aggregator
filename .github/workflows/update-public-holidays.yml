name: Update public holidays

on:
  schedule:
    - cron: "0 4 1 * *"   # 1st of every month at 04:00 UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml lxml

      - name: Run holiday updater
        run: python scripts/update_public_holidays.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public_holidays.yaml
          git diff --staged --quiet || git commit -m "Update public holidays $(date -u '+%Y-%m-%d')"
          git push
