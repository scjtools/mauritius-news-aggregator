name: Aggregate news feed

on:
  schedule:
    - cron: "0 22 * * *"  # 02:00 Mauritius time (UTC+4)
    - cron: "0 2 * * *"   # 06:00 Mauritius time (UTC+4)
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests pyyaml beautifulsoup4 lxml python-dateutil curl_cffi

      - name: Run aggregator
        run: python aggregator.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml market_cache.json inject.yaml
          git diff --staged --quiet || git commit -m "Update feed $(date -u '+%Y-%m-%d %H:%M')"
          git push
