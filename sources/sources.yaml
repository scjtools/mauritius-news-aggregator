# ─────────────────────────────────────────────────────────────
# Mauritius News Aggregator — Source Definitions
# ─────────────────────────────────────────────────────────────

rss_feeds:

  # ── Local news ──────────────────────────────────────────────
  - name: "News Moris"
    url: "https://newsmoris.com/feed/"
    language: "en"
    category: "local"

  - name: "ION News"
    url: "https://ionnews.mu/feed/"
    language: "en"
    category: "local"

  - name: "Mauritius Times"
    url: "https://mauritiustimes.com/mt/feed/"
    language: "en"
    category: "local"


  - name: "Reddit r/mauritius"
    url: "https://www.reddit.com/r/mauritius/.rss"
    language: "en"
    category: "community"

  # ── Regional ────────────────────────────────────────────────
  # AllAfrica /latest/ — pan-African aggregator, 400+ stories/day from 120+
  # African news organisations. Active feed replacing broken country-specific feeds.
  - name: "AllAfrica"
    url: "https://allafrica.com/tools/headlines/rdf/latest/headlines.rdf"
    language: "en"
    category: "regional"

  # TechCabal — pan-African tech, business and finance publication.
  # Covers the same ground as Business Insider Africa (startups, fintech,
  # regulation, governance) with a confirmed working RSS feed.
  - name: "TechCabal"
    url: "https://techcabal.com/feed/"
    language: "en"
    category: "regional"







  # ── Africa ──────────────────────────────────────────────────
  - name: "Africanews"
    url: "https://www.africanews.com/feed/rss"
    language: "en"
    category: "regional"

  - name: "BBC Africa"
    url: "https://feeds.bbci.co.uk/news/world/africa/rss.xml"
    language: "en"
    category: "regional"

  # ── India ────────────────────────────────────────────────
  # Scroll.in — curated independent Indian news, ~15-20 items/day,
  # politics, economy, society. Much lighter than The Hindu national feed.
  - name: "Scroll.in"
    url: "https://feeds.feedburner.com/ScrollinArticles.rss"
    language: "en"
    category: "regional"

  # ── International — top stories across all genres ───────────
  # BBC World feed (with sport) via bbc-feeds.danq.dev — strips iPlayer/app
  # promotion noise from BBC's own feed, keeps world news + sport
  - name: "BBC News"
    url: "https://bbc-feeds.danq.dev/world-sports.xml"
    language: "en"
    category: "international"

  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    language: "en"
    category: "international"

  # France 24 English — international broadcaster, strong on global affairs,
  # sport, culture and business; French perspective relevant to Mauritian readers
  - name: "France 24"
    url: "https://www.france24.com/en/rss"
    language: "en"
    category: "international"


scrapers:

  # ── L'Express via mega.mu (full summaries, paginated) ────────
  - name: "L'Express (via mega.mu)"
    url: "https://live.mega.mu/"
    language: "fr"
    category: "local"
    type: megamu
    max_pages: 5

  # ── Defimedia sections ───────────────────────────────────────
  - name: "Defimedia Actualités"
    url: "https://defimedia.info/actualites"
    language: "fr"
    category: "local"

  - name: "Defimedia Politique"
    url: "https://defimedia.info/politique"
    language: "fr"
    category: "local"

  - name: "Defimedia Faits Divers"
    url: "https://defimedia.info/faits-divers"
    language: "fr"
    category: "local"

  - name: "Defimedia Économie"
    url: "https://defimedia.info/economie"
    language: "fr"
    category: "local"

  # ── African business scraper ─────────────────────────────
  # Business Insider Africa — pan-African business, finance, tech news.
  # No RSS feed available. Site has bot detection; may need User-Agent tuning
  # if it returns 0 items on first run.
  - name: "Business Insider Africa"
    url: "https://africa.businessinsider.com/"
    language: "en"
    category: "regional"

  # ── Regional neighbour scrapers ──────────────────────────

  # ── Utilities & data ─────────────────────────────────────────
  - name: "Mauritius Met Services"
    url: "https://metservice.intnet.mu/forecast-bulletin-english-mauritius.php"
    language: "en"
    category: "weather"
    type: bulletin

  - name: "Stock Exchange of Mauritius"
    url: "https://www.stockexchangeofmauritius.com/products-market-data/indices"
    language: "en"
    category: "finance"
    type: semdex

  - name: "CEB Power Outages"
    url: "https://raw.githubusercontent.com/MrSunshyne/mauritius-dataset-electricity/main/data/power-outages.latest.json"
    language: "en"
    category: "utilities"
    type: power_outages

  - name: "Mauritius Public Holidays"
    url: "data/public_holidays.yaml"
    language: "en"
    category: "government"
    type: public_holidays


exchange_rates:

  - name: "MUR Exchange Rates"
    url: "https://www.floatrates.com/daily/mur.xml"
    language: "en"
    category: "finance"
    currencies: [USD, EUR]

  - name: "Gold Price"
    url: "https://api.gold-api.com/price/XAU"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Bitcoin Price"
    url: "https://api.gold-api.com/price/BTC"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Brent Crude Oil"
    url: "https://api.oilpriceapi.com/v1/demo/prices"
    language: "en"
    category: "finance"
    type: oilprice_demo
