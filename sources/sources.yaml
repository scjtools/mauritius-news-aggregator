scrapers:

  # ── Local ───────────────────────────────────────────────────
  - name: "L'Express (via mega.mu)"
    url: "https://live.mega.mu/"
    language: "fr"
    category: "local"
    type: megamu
    max_pages: 5

  - name: "Defimedia"
    url: "https://defimedia.info"
    language: "fr"
    category: "local"
    category_allowlist:
      - "Actualités"
      - "Politique"
      - "Faits Divers"
      - "Economie"

  - name: "Le Mauricien"
    url: "https://www.lemauricien.com"
    language: "fr"
    category: "local"
    type: lemauricien
    url_path_allowlist:
      - "/actualites/politique/"
      - "/actualites/faits-divers/"
      - "/actualites/societe/"
      - "/actualites/economie/"

  # ── Utilities & data ─────────────────────────────────────────

  - name: "Stock Exchange of Mauritius"
    url: "https://www.stockexchangeofmauritius.com/products-market-data/indices"
    language: "en"
    category: "finance"
    type: semdex

  - name: "Mauritius Public Holidays"
    url: "data/public_holidays.yaml"
    language: "en"
    category: "government"
    type: public_holidays


market_data:

  - name: "MUR Exchange Rates"
    url: "https://www.floatrates.com/daily/mur.xml"
    language: "en"
    category: "finance"
    currencies: [USD, EUR]

  - name: "Gold Price"
    url: "https://api.gold-api.com/price/XAU"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Bitcoin Price"
    url: "https://api.gold-api.com/price/BTC"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Brent Crude Oil"
    url: "https://api.oilpriceapi.com/v1/demo/prices"
    language: "en"
    category: "finance"
    type: oilprice_demo
