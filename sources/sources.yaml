market_data:

  - name: "MUR Exchange Rates"
    url: "https://www.floatrates.com/daily/mur.xml"
    language: "en"
    category: "finance"
    currencies: [USD, EUR]

  - name: "Gold Price"
    url: "https://api.gold-api.com/price/XAU"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Bitcoin Price"
    url: "https://api.gold-api.com/price/BTC"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Brent Crude Oil"
    url: "https://api.oilpriceapi.com/v1/demo/prices"
    language: "en"
    category: "finance"
    type: oilprice_demo
