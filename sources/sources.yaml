# ─────────────────────────────────────────────────────────────
# Mauritius News Aggregator — Source Definitions
# ─────────────────────────────────────────────────────────────

rss_feeds:

  # ── Local news ──────────────────────────────────────────────
  - name: "News Moris"
    url: "https://newsmoris.com/feed/"
    language: "en"
    category: "local"

  - name: "Mauritius Times"
    url: "https://mauritiustimes.com/mt/feed/"
    language: "en"
    category: "local"

  - name: "GovMU"
    url: "https://news.google.com/rss/search?q=site:govmu.org&hl=en-MU&gl=MU&ceid=MU:en"
    language: "en"
    category: "government"

  - name: "Reddit r/mauritius"
    url: "https://www.reddit.com/r/mauritius/.rss"
    language: "en"
    category: "community"

  # ── Regional ────────────────────────────────────────────────
  - name: "AllAfrica Mauritius"
    url: "https://allafrica.com/tools/headlines/rdf/mauritius/headlines.rdf"
    language: "en"
    category: "regional"

  - name: "AllAfrica Seychelles"
    url: "https://allafrica.com/tools/headlines/rdf/seychelles/headlines.rdf"
    language: "en"
    category: "regional"

  - name: "AllAfrica Comoros"
    url: "https://allafrica.com/tools/headlines/rdf/comoros/headlines.rdf"
    language: "en"
    category: "regional"

  - name: "AllAfrica Madagascar"
    url: "https://allafrica.com/tools/headlines/rdf/madagascar/headlines.rdf"
    language: "en"
    category: "regional"

  - name: "AllAfrica Mozambique"
    url: "https://allafrica.com/tools/headlines/rdf/mozambique/headlines.rdf"
    language: "en"
    category: "regional"

  - name: "Google News Rodrigues"
    url: "https://news.google.com/rss/search?q=Rodrigues+island+Mauritius&hl=en&gl=MU&ceid=MU:en"
    language: "en"
    category: "regional"

  - name: "Google News Reunion"
    url: "https://news.google.com/rss/search?q=Reunion+island+news&hl=fr&gl=MU&ceid=MU:fr"
    language: "fr"
    category: "regional"

  # ── Africa ──────────────────────────────────────────────────
  - name: "Africanews"
    url: "https://www.africanews.com/feed/rss"
    language: "en"
    category: "africa"

  - name: "BBC Africa"
    url: "https://feeds.bbci.co.uk/news/world/africa/rss.xml"
    language: "en"
    category: "africa"

  # ── International — top stories across all genres ───────────
  - name: "BBC News"
    url: "https://feeds.bbci.co.uk/news/rss.xml"
    language: "en"
    category: "international"

  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    language: "en"
    category: "international"


scrapers:

  # ── L'Express via mega.mu (full summaries, paginated) ────────
  - name: "L'Express (via mega.mu)"
    url: "https://live.mega.mu/"
    language: "fr"
    category: "local"
    type: megamu
    max_pages: 5

  # ── Defimedia sections ───────────────────────────────────────
  - name: "Defimedia Actualités"
    url: "https://defimedia.info/actualites"
    language: "fr"
    category: "local"

  - name: "Defimedia Politique"
    url: "https://defimedia.info/politique"
    language: "fr"
    category: "local"

  - name: "Defimedia Faits Divers"
    url: "https://defimedia.info/faits-divers"
    language: "fr"
    category: "local"

  - name: "Defimedia Économie"
    url: "https://defimedia.info/economie"
    language: "fr"
    category: "local"

  # ── Utilities & data ─────────────────────────────────────────
  - name: "Mauritius Met Services"
    url: "https://metservice.intnet.mu/forecast-bulletin-english-mauritius.php"
    language: "en"
    category: "weather"
    type: bulletin

  - name: "Stock Exchange of Mauritius"
    url: "https://www.stockexchangeofmauritius.com/products-market-data/indices"
    language: "en"
    category: "finance"
    type: semdex

  - name: "CEB Power Outages"
    url: "https://raw.githubusercontent.com/MrSunshyne/mauritius-dataset-electricity/main/data/power-outages.latest.json"
    language: "en"
    category: "utilities"
    type: power_outages

  - name: "Mauritius Public Holidays"
    url: "data/public_holidays.yaml"
    language: "en"
    category: "government"
    type: public_holidays


exchange_rates:

  - name: "MUR Exchange Rates"
    url: "https://www.floatrates.com/daily/mur.xml"
    language: "en"
    category: "finance"
    currencies: [USD, EUR]

  - name: "Gold Price"
    url: "https://api.gold-api.com/price/XAU"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Bitcoin Price"
    url: "https://api.gold-api.com/price/BTC"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Brent Crude Oil"
    url: "https://api.oilpriceapi.com/v1/demo/prices"
    language: "en"
    category: "finance"
    type: oilprice_demo
