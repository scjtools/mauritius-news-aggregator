rss_feeds:

  # ── Local ───────────────────────────────────────────────────
  - name: "News Moris"
    url: "https://newsmoris.com/feed/"
    language: "en"
    category: "local"

  - name: "ION News"
    url: "https://ionnews.mu/feed/"
    language: "fr"
    category: "local"

  - name: "Le Mauricien"
    url: "https://www.lemauricien.com/feed/"
    language: "fr"
    category: "local"

  # ── Regional ────────────────────────────────────────────────
  - name: "TechCabal"
    url: "https://techcabal.com/feed/"
    language: "en"
    category: "regional"

  - name: "Africanews"
    url: "https://www.africanews.com/feed/rss"
    language: "en"
    category: "regional"

  - name: "BBC Africa"
    url: "https://bbc-feeds.danq.dev/africa-sports.xml"
    language: "en"
    category: "regional"

  # ── Global ───────────────────────────────────────────────────
  - name: "BBC News"
    url: "https://bbc-feeds.danq.dev/world-sports.xml"
    language: "en"
    category: "global"

  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    language: "en"
    category: "global"

  - name: "France 24"
    url: "https://www.france24.com/en/rss"
    language: "en"
    category: "global"
    summary_fallback_title: true


scrapers:

  # ── Local ───────────────────────────────────────────────────
  - name: "L'Express (via mega.mu)"
    url: "https://live.mega.mu/"
    language: "fr"
    category: "local"
    type: megamu
    max_pages: 5

  - name: "Defimedia"
    url: "https://defimedia.info"
    language: "fr"
    category: "local"
    category_allowlist:
      - "Actualités"
      - "Politique"
      - "Faits Divers"
      - "Economie"

  - name: "Le Mauricien"
    url: "https://www.lemauricien.com"
    language: "fr"
    category: "local"
    type: lemauricien
    url_path_allowlist:
      - "/actualites/politique/"
      - "/actualites/faits-divers/"
      - "/actualites/societe/"
      - "/actualites/economie/"

  # ── Regional ────────────────────────────────────────────────
  - name: "Business Insider Africa"
    url: "https://africa.businessinsider.com/"
    language: "en"
    category: "regional"

  # ── Utilities & data ─────────────────────────────────────────
  - name: "Mauritius Met Services"
    url: "https://metservice.intnet.mu/forecast-bulletin-english-mauritius.php"
    language: "en"
    category: "weather"
    type: bulletin

  - name: "Stock Exchange of Mauritius"
    url: "https://www.stockexchangeofmauritius.com/products-market-data/indices"
    language: "en"
    category: "finance"
    type: semdex

  - name: "CEB Power Outages"
    url: "https://raw.githubusercontent.com/MrSunshyne/mauritius-dataset-electricity/main/data/power-outages.latest.json"
    language: "en"
    category: "utilities"
    type: power_outages

  - name: "Mauritius Public Holidays"
    url: "data/public_holidays.yaml"
    language: "en"
    category: "government"
    type: public_holidays


market_data:

  - name: "MUR Exchange Rates"
    url: "https://www.floatrates.com/daily/mur.xml"
    language: "en"
    category: "finance"
    currencies: [USD, EUR]

  - name: "Gold Price"
    url: "https://api.gold-api.com/price/XAU"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Bitcoin Price"
    url: "https://api.gold-api.com/price/BTC"
    language: "en"
    category: "finance"
    type: gold_api

  - name: "Brent Crude Oil"
    url: "https://api.oilpriceapi.com/v1/demo/prices"
    language: "en"
    category: "finance"
    type: oilprice_demo
