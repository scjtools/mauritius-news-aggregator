scrapers:

  - name: "L'Express (via mega.mu)"
    url: "https://live.mega.mu/"
    language: "fr"
    category: "local"
    type: megamu
    max_pages: 3

  - name: "Defimedia"
    url: "https://defimedia.info"
    language: "fr"
    category: "local"
    category_allowlist:
      - "Actualités"
      - "Politique"
      - "Faits Divers"
      - "Economie"

  - name: "Le Mauricien"
    url: "https://www.lemauricien.com"
    language: "fr"
    category: "local"
    type: lemauricien
    url_path_allowlist:
      - "/actualites/politique/"
      - "/actualites/economie/"

  - name: "Stock Exchange of Mauritius"
    url: "https://www.stockexchangeofmauritius.com/products-market-data/indices"
    language: "en"
    category: "finance"
    type: semdex

